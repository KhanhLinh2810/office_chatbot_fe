<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phòng họp - Office Chatbot</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <button class="hamburger" onclick="toggleSidebar()">☰</button>
  <div class="app-layout">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>🏢 Office Chatbot</h2>
        <p class="user-name" id="userName">Đang tải...</p>
        <p class="user-role" id="userRole"></p>
      </div>
      <div class="sidebar-nav">
        <a href="/chat.html">💬 Chatbot</a>
        <a href="/meetings.html">📅 Lịch họp</a>
        <a href="/users.html" class="admin-only">👥 Người dùng</a>
        <a href="/rooms.html" class="active admin-only">🏠 Phòng họp</a>
      </div>
      <div class="sidebar-footer">
        <a href="#" onclick="logout()" style="color:var(--gray-300);">🚪 Đăng xuất</a>
      </div>
    </nav>

    <main class="main-content">
      <div class="page-header">
        <h1>🏠 Quản lý phòng họp</h1>
        <button class="btn btn-primary" onclick="openCreateModal()">+ Thêm phòng họp</button>
      </div>

      <div id="roomsContent">
        <div class="loading-overlay">
          <div class="loading-spinner"></div>
          <span>Đang tải dữ liệu...</span>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal tạo/sửa phòng họp -->
  <div class="modal-overlay" id="roomModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Thêm phòng họp mới</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="roomForm">
          <div class="form-group">
            <label for="roomName">Tên phòng</label>
            <input type="text" id="roomName" placeholder="Nhập tên phòng họp" required>
          </div>
          <div class="form-group">
            <label for="roomCapacity">Sức chứa</label>
            <input type="number" id="roomCapacity" placeholder="Số người tối đa" min="1" required>
          </div>
          <div class="form-group">
            <label for="roomLocation">Vị trí</label>
            <input type="text" id="roomLocation" placeholder="Ví dụ: Tầng 3, Tòa A">
          </div>
          <div class="form-group">
            <label for="roomDescription">Mô tả</label>
            <textarea id="roomDescription" rows="3" placeholder="Mô tả tiện nghi phòng họp"></textarea>
          </div>
          <input type="hidden" id="roomId">
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">Hủy</button>
        <button class="btn btn-primary" onclick="saveRoom()">Lưu</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/config.js"></script>
  <script src="/js/rooms.js"></script>
</body>
</html>

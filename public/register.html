<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - Office Chatbot</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>🏢 Office Chatbot</h1>
      <p class="subtitle">Tạo tài khoản mới</p>

      <div id="errorMsg" style="display:none;background:var(--red-light);color:var(--red-dark);padding:0.75rem;border-radius:var(--radius);margin-bottom:1rem;font-size:0.9rem;"></div>

      <form id="registerForm">
        <div class="form-group">
          <label for="fullName">Họ và tên</label>
          <input type="text" id="fullName" placeholder="Nhập họ và tên" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Nhập email" required>
        </div>
        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" placeholder="Tối thiểu 6 ký tự" required minlength="6">
        </div>
        <div class="form-group">
          <label for="confirmPassword">Xác nhận mật khẩu</label>
          <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
          Đăng ký
        </button>
      </form>

      <p style="text-align:center;margin-top:1.5rem;color:var(--gray-500);font-size:0.9rem;">
        Đã có tài khoản? <a href="/index.html">Đăng nhập</a>
      </p>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>

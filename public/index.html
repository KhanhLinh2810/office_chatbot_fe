<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Office Chatbot</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>🏢 Office Chatbot</h1>
      <p class="subtitle">Đăng nhập để tiếp tục</p>

      <div id="errorMsg" style="display:none;background:var(--red-light);color:var(--red-dark);padding:0.75rem;border-radius:var(--radius);margin-bottom:1rem;font-size:0.9rem;"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Nhập email của bạn" required>
        </div>
        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" placeholder="Nhập mật khẩu" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
          Đăng nhập
        </button>
      </form>

      <p style="text-align:center;margin-top:1.5rem;color:var(--gray-500);font-size:0.9rem;">
        Chưa có tài khoản? <a href="/register.html">Đăng ký ngay</a>
      </p>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
